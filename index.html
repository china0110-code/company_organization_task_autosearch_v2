<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI導入効果分析ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>AI導入効果分析ツール</h1>

  <!-- ステップ1 -->
  <div class="section-label">ステップ1：情報を入力してプロンプトを生成</div>
  <div class="input-section">
    <div class="input-group">
      <label for="company">企業名・業種</label>
      <input type="text" id="company" placeholder="例：トヨタ自動車（製造業）" />
    </div>
    <div class="input-group">
      <label for="dept">部署名（部課レベル）</label>
      <input type="text" id="dept" placeholder="例：経理部 経費精算課" />
    </div>
  </div>

  <div class="granularity-group">
    <span class="granularity-label">業務の洗い出し粒度</span>
    <div class="granularity-options">
      <div class="gran-option">
        <input type="radio" name="granularity" id="gran-honbu" class="gran-radio" value="honbu">
        <label for="gran-honbu" class="gran-label">
          <span class="gran-title">本部レベル</span>
          <span class="gran-desc">大きな業務領域・機能単位（5〜8件）</span>
        </label>
      </div>
      <div class="gran-option">
        <input type="radio" name="granularity" id="gran-buka" class="gran-radio" value="buka" checked>
        <label for="gran-buka" class="gran-label">
          <span class="gran-title">部課レベル</span>
          <span class="gran-desc">具体的な業務プロセス単位（10〜18件）</span>
        </label>
      </div>
      <div class="gran-option">
        <input type="radio" name="granularity" id="gran-tanto" class="gran-radio" value="tanto">
        <label for="gran-tanto" class="gran-label">
          <span class="gran-title">担当レベル</span>
          <span class="gran-desc">個々の作業・タスク単位（20〜30件）</span>
        </label>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button type="button" class="btn-run" onclick="generatePrompt()">プロンプトを生成する ↗</button>
    <button type="button" class="btn-clear" onclick="clearStep1()">クリア</button>
  </div>

  <div class="prompt-box" id="prompt-box">
    <div class="prompt-box-label">👇 以下をコピーしてClaudeに貼り付けてください</div>
    <textarea class="prompt-textarea" id="prompt-textarea" readonly></textarea>
    <div class="copy-row">
      <button type="button" class="copy-btn" onclick="copyPrompt()">コピーする</button>
      <span class="copy-success" id="copy-success">✓ コピーしました！</span>
    </div>
  </div>

  <div class="hint">「プロンプトを生成する」を押すと下にテキストが表示されます。コピーしてClaude.aiに貼り付けて送信し、返ってきたJSONをステップ2に貼り付けてください。</div>

  <hr class="divider">

  <!-- ステップ2 -->
  <div class="section-label">ステップ2：Claudeの回答を貼り付けて表示</div>
  <textarea id="paste-area" placeholder='Claudeが返したJSONをここに貼り付け（{"tasks":[...]} の形式）'></textarea>
  <div class="btn-row2">
    <button type="button" class="btn-render" onclick="renderFromPaste()">表に変換する ↗</button>
    <button type="button" class="btn-clear" onclick="clearStep2()">クリア</button>
  </div>

  <div id="output"></div>

  <!-- エクスポートボタン（結果表示後に表示） -->
  <div class="export-bar" id="export-bar">
    <span class="export-label">レポート出力：</span>
    <button type="button" class="btn-export btn-pdf" onclick="exportPDF()">📄 PDF</button>
    <button type="button" class="btn-export btn-excel" onclick="exportExcel()">📊 Excel</button>
  </div>
</div>

<!-- PDF印刷用の隠しエリア -->
<div id="print-area" class="print-only"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
